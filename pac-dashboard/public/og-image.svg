<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#0c1526"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="55%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#4ade80"/>
    </linearGradient>
    <linearGradient id="areaGreen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="areaBlue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative chart — right side -->
  <path d="M 680,520 C 800,500 950,410 1200,270 L 1200,630 L 680,630 Z" fill="url(#areaGreen)"/>
  <path d="M 680,520 C 800,510 950,450 1200,350 L 1200,630 L 680,630 Z" fill="url(#areaBlue)"/>
  <path d="M 680,520 C 800,510 950,450 1200,350" stroke="#3b82f6" stroke-width="2.5" fill="none" opacity="0.7"/>
  <path d="M 680,520 C 800,500 950,410 1200,270" stroke="#22c55e" stroke-width="2.5" fill="none" opacity="0.7"/>
  <!-- Dashed baseline -->
  <line x1="680" y1="520" x2="1200" y2="500" stroke="#1e293b" stroke-width="1.5" stroke-dasharray="8,5"/>

  <!-- Accent bar top-left -->
  <rect x="80" y="100" width="140" height="4" rx="2" fill="url(#brand)"/>

  <!-- ETF Lens wordmark -->
  <text x="80" y="230" font-family="system-ui,-apple-system,Segoe UI,sans-serif" font-size="96" font-weight="900" letter-spacing="-3" fill="url(#brand)">ETF Lens</text>

  <!-- Tagline -->
  <text x="80" y="296" font-family="system-ui,-apple-system,Segoe UI,sans-serif" font-size="30" fill="#94a3b8" letter-spacing="-0.5">Tracker gratuito per portafoglio ETF e PAC</text>

  <!-- Sub-tagline -->
  <text x="80" y="344" font-family="system-ui,-apple-system,Segoe UI,sans-serif" font-size="22" fill="#475569">Calcola ROI, CAGR, TWRR · Proietta la crescita futura</text>

  <!-- Badge: Gratuito -->
  <rect x="80" y="395" width="140" height="44" rx="22" fill="#0f2027" stroke="#1e3a2f" stroke-width="1"/>
  <text x="150" y="423" font-family="system-ui,-apple-system,Segoe UI,sans-serif" font-size="18" fill="#4ade80" text-anchor="middle" font-weight="600">✓ Gratuito</text>

  <!-- Badge: Open source -->
  <rect x="238" y="395" width="168" height="44" rx="22" fill="#0f2027" stroke="#1e3a2f" stroke-width="1"/>
  <text x="322" y="423" font-family="system-ui,-apple-system,Segoe UI,sans-serif" font-size="18" fill="#4ade80" text-anchor="middle" font-weight="600">✓ Open source</text>

  <!-- Badge: Dati tuoi -->
  <rect x="424" y="395" width="150" height="44" rx="22" fill="#0f2027" stroke="#1e3a2f" stroke-width="1"/>
  <text x="499" y="423" font-family="system-ui,-apple-system,Segoe UI,sans-serif" font-size="18" fill="#4ade80" text-anchor="middle" font-weight="600">✓ Dati tuoi</text>

  <!-- URL -->
  <text x="80" y="535" font-family="system-ui,-apple-system,Segoe UI,sans-serif" font-size="22" fill="#334155" letter-spacing="0.5">etflens.app</text>
</svg>
